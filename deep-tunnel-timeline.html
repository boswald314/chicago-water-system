<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Building the Deep Tunnel — a TARP Construction Timeline</title>
<meta name="description" content="A scroll timeline of Chicago's Tunnel and Reservoir Plan: the flooding and sewage crisis that forced it, the plans that lost, five decades of construction, and what the system can and cannot do.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕳️</text></svg>">
<script src="timeline-data/tarp-timeline.js"></script>
<style>
  :root {
    --bg:#f7f8fa; --panel:#ffffff; --ink:#1a202c; --ink2:#4a5568; --line:#d8dde5; --accent:#2b6cb0;
    --problem:#b03030; --decision:#2b6cb0; --construction:#b7791f; --milestone:#2c9a8f;
    --controversy:#7c5cad; --outcome:#3f7a4d;
    --quote-bg:#f1f4f8;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#171c23; --panel:#1f2630; --ink:#c6cfd9; --ink2:#8f9aa8; --line:#313c4a; --accent:#6ba3d6;
      --problem:#d97070; --decision:#6ba3d6; --construction:#c69a52; --milestone:#4aae9f;
      --controversy:#a68bd0; --outcome:#6fae7e;
      --quote-bg:#232b36; }
  }
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { margin:0; font:16px/1.65 -apple-system,"Segoe UI",Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); }
  .sitenav { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
    padding:10px 22px; background:var(--panel); border-bottom:1px solid var(--line); position:relative; z-index:1200; }
  .sitenav .brand { font-weight:700; color:var(--ink); text-decoration:none; font-size:16px; }
  .sitenav .links { display:flex; gap:16px; flex-wrap:wrap; }
  .sitenav .links a { color:var(--ink2); text-decoration:none; font-size:14px; }
  .sitenav .links a:hover { color:var(--accent); }

  /* scroll progress */
  #progress { position:fixed; top:0; left:0; height:3px; background:var(--accent); width:0; z-index:2000; }

  /* hero */
  header.hero { max-width:880px; margin:0 auto; padding:56px 24px 30px; }
  .hero h1 { font-size:clamp(28px,5vw,44px); line-height:1.15; margin:0 0 14px; letter-spacing:-.5px; }
  .hero .lede { font-size:clamp(16px,2.2vw,19px); color:var(--ink2); max-width:64ch; }
  .hero .lede b { color:var(--ink); }
  .stats { display:flex; gap:0; flex-wrap:wrap; margin:28px 0 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .stat { flex:1 1 130px; padding:14px 16px 12px; border-right:1px solid var(--line); }
  .stat:last-child { border-right:none; }
  .stat .n { font-size:clamp(18px,2.6vw,24px); font-weight:750; font-variant-numeric:tabular-nums; }
  .stat .l { font-size:12px; color:var(--ink2); text-transform:uppercase; letter-spacing:.6px; margin-top:2px; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; margin:18px 0 0; font-size:12.5px; color:var(--ink2); }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .legend i { width:10px; height:10px; border-radius:50%; display:inline-block; }

  /* year pill */
  #yearpill { position:fixed; right:14px; bottom:16px; z-index:1500; background:var(--panel); border:1px solid var(--line);
    border-radius:999px; padding:6px 14px; font-weight:750; font-size:15px; font-variant-numeric:tabular-nums;
    box-shadow:0 2px 10px rgba(0,0,0,.12); opacity:0; transition:opacity .35s; pointer-events:none; }
  #yearpill.on { opacity:.94; }

  /* timeline structure */
  main { max-width:880px; margin:0 auto; padding:8px 24px 80px; }
  section.era { margin-top:34px; }
  .erahead { position:sticky; top:0; z-index:900; background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    padding:12px 0 10px; border-bottom:1px solid var(--line); }
  .erahead .range { font-size:12.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--accent); font-weight:700; }
  .erahead h2 { margin:2px 0 0; font-size:clamp(20px,3.4vw,28px); line-height:1.2; }
  .eralede { color:var(--ink2); max-width:66ch; margin:14px 0 6px; }

  .events { position:relative; margin-top:10px; padding-left:34px; }
  .events::before { content:""; position:absolute; left:9px; top:6px; bottom:6px; width:2px;
    background:var(--line); border-radius:2px; }

  article.ev { position:relative; margin:26px 0; opacity:0; transform:translateY(14px);
    transition:opacity .55s ease, transform .55s ease; }
  article.ev.in { opacity:1; transform:none; }
  @media (prefers-reduced-motion: reduce) {
    article.ev { opacity:1; transform:none; transition:none; }
    html { scroll-behavior:auto; }
  }
  .ev .dot { position:absolute; left:-31px; top:7px; width:12px; height:12px; border-radius:50%;
    border:2.5px solid var(--kc, var(--accent)); background:var(--bg); }
  .ev.major .dot { background:var(--kc, var(--accent)); }
  .ev .meta { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .ev .yr { font-weight:800; font-size:17px; font-variant-numeric:tabular-nums; }
  .ev .date { color:var(--ink2); font-size:13px; }
  .ev .chip { font-size:10.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
    color:var(--kc, var(--accent)); border:1px solid color-mix(in srgb, var(--kc, var(--accent)) 45%, transparent);
    border-radius:999px; padding:1.5px 9px; }
  .ev h3 { margin:4px 0 6px; font-size:clamp(16.5px,2.4vw,19.5px); line-height:1.3; }
  .ev .body { color:var(--ink); max-width:68ch; }
  .ev .body p { margin:0; }
  .ev .syschips { margin-top:7px; display:flex; gap:6px; flex-wrap:wrap; }
  .ev .syschips span { font-size:11px; color:var(--ink2); background:var(--panel); border:1px solid var(--line);
    border-radius:5px; padding:1px 7px; }
  .ev .doclink { display:inline-block; margin-top:8px; font-size:13px; color:var(--accent); text-decoration:none; }
  .ev .doclink:hover { text-decoration:underline; }

  /* minor events render compact */
  .ev.minor .body { color:var(--ink2); font-size:14.5px; }
  .ev.minor h3 { font-size:15.5px; margin-bottom:3px; }
  .ev.minor { margin:18px 0; }

  figure.evfig { margin:14px 0 4px; background:var(--panel); border:1px solid var(--line); border-radius:10px;
    overflow:hidden; }
  figure.evfig img { display:block; width:100%; height:auto; }
  figure.evfig figcaption { padding:9px 13px 10px; font-size:12.5px; color:var(--ink2); line-height:1.5; }
  figure.evfig figcaption .credit { display:block; margin-top:2px; font-size:11px; opacity:.8; }

  blockquote.pull { margin:14px 0 4px; padding:14px 18px 12px; background:var(--quote-bg);
    border-left:3px solid var(--kc, var(--accent)); border-radius:0 9px 9px 0; }
  blockquote.pull p { margin:0; font-family:Georgia,'Times New Roman',serif; font-size:16.5px; line-height:1.55;
    font-style:italic; }
  blockquote.pull cite { display:block; margin-top:8px; font-size:12.5px; color:var(--ink2); font-style:normal; }

  footer.tail { max-width:880px; margin:30px auto 0; padding:22px 24px 60px; border-top:1px solid var(--line);
    color:var(--ink2); font-size:14px; }
  footer.tail a { color:var(--accent); }
</style>
</head>
<body>
<div id="progress"></div>
<nav class="sitenav">
  <a class="brand" href="#">💧 Chicago's Water System</a>
  <div class="links" id="navlinks"></div>
</nav>

<header class="hero">
  <h1 id="hero-title"></h1>
  <p class="lede" id="hero-lede"></p>
  <div class="stats" id="stats"></div>
  <div class="legend" id="legend"></div>
</header>

<main id="timeline"></main>
<div id="yearpill">1950</div>

<footer class="tail" id="tail"></footer>

<script>
const LOCAL = location.protocol === 'file:';
const doc = p => LOCAL ? p.replace('.html', '.md') : p;
document.getElementById('navlinks').innerHTML = [
  ['Flow map', LOCAL ? 'index.html' : './'],
  ['Geographic map', 'geo.html'],
  ['Deep Tunnel timeline', 'deep-tunnel-timeline.html'],
  ['Overview', LOCAL ? '00-SYSTEM-OVERVIEW.md' : '00-SYSTEM-OVERVIEW.html'],
  ['Documents', 'docs/'], ['Galleries', LOCAL ? 'images/' : 'gallery/'],
  ['Search', LOCAL ? 'search.md' : 'search.html'],
  ['Sources', LOCAL ? 'SOURCES.md' : 'SOURCES.html'],
].map(([t, h]) => `<a href="${h}">${t}</a>`).join('');

const D = window.TARPTIMELINE;
const KINDLABEL = { problem:'Problem', decision:'Decision', construction:'Construction',
  milestone:'Milestone', controversy:'Controversy', outcome:'Outcome' };
const SYSLABEL = { mainstream:'Mainstream', calumet:'Calumet', 'des-plaines':'Des Plaines',
  ohare:"O'Hare/UDP", majewski:'Majewski', thornton:'Thornton', mccook:'McCook', system:'System-wide' };

// hero
document.getElementById('hero-title').textContent = D.title;
document.getElementById('hero-lede').innerHTML = D.lede;
document.getElementById('stats').innerHTML = D.stats.map(s =>
  `<div class="stat"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');
document.getElementById('legend').innerHTML = Object.entries(KINDLABEL).map(([k, l]) =>
  `<span><i style="background:var(--${k})"></i>${l}</span>`).join('');

// timeline
const esc = s => (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const main = document.getElementById('timeline');
for (const era of D.eras) {
  const sec = document.createElement('section');
  sec.className = 'era';
  sec.innerHTML = `<div class="erahead"><div class="range">${era.range}</div><h2>${esc(era.title)}</h2></div>
    <p class="eralede">${era.lede}</p><div class="events"></div>`;
  const wrap = sec.querySelector('.events');
  for (const ev of era.events) {
    const a = document.createElement('article');
    a.className = `ev ${ev.weight || 'standard'}`;
    a.style.setProperty('--kc', `var(--${ev.kind})`);
    a.dataset.year = ev.year;
    let h = `<span class="dot"></span>
      <div class="meta"><span class="yr">${ev.year}</span>${ev.date ? `<span class="date">${esc(ev.date)}</span>` : ''}
        <span class="chip">${KINDLABEL[ev.kind] || ev.kind}</span></div>
      <h3>${esc(ev.title)}</h3>
      <div class="body"><p>${ev.body}</p></div>`;
    if (ev.image) {
      h += `<figure class="evfig"><img loading="lazy" src="${ev.image.src}" alt="${esc(ev.image.caption)}">
        <figcaption>${esc(ev.image.caption)}<span class="credit">${esc(ev.image.credit || '')}</span></figcaption></figure>`;
    }
    if (ev.quote) {
      h += `<blockquote class="pull"><p>“${esc(ev.quote.text)}”</p><cite>— ${esc(ev.quote.attribution)}</cite></blockquote>`;
    }
    if (ev.system && ev.system.length && !(ev.system.length === 1 && ev.system[0] === 'system')) {
      h += `<div class="syschips">${ev.system.map(s => `<span>${SYSLABEL[s] || s}</span>`).join('')}</div>`;
    }
    if (ev.doc) {
      h += `<a class="doclink" href="${LOCAL ? 'docs/' + ev.doc + '.md' : 'docs/' + ev.doc + '.html'}">Read the full research →</a>`;
    }
    a.innerHTML = h;
    wrap.appendChild(a);
  }
  main.appendChild(sec);
}

// footer
document.getElementById('tail').innerHTML = D.footer;

// reveal + year pill
const pill = document.getElementById('yearpill');
const io = new IntersectionObserver(entries => {
  for (const e of entries) {
    if (e.isIntersecting) {
      e.target.classList.add('in');
      pill.textContent = e.target.dataset.year;
      pill.classList.add('on');
    }
  }
}, { threshold: 0.25, rootMargin: '0px 0px -8% 0px' });
document.querySelectorAll('article.ev').forEach(el => io.observe(el));

// scroll progress + hide pill at very top
addEventListener('scroll', () => {
  const h = document.documentElement;
  const p = h.scrollTop / (h.scrollHeight - h.clientHeight);
  document.getElementById('progress').style.width = (p * 100).toFixed(2) + '%';
  if (h.scrollTop < 250) pill.classList.remove('on');
}, { passive: true });
</script>
</body>
</html>
